name: Build and Push Docker Hub

on:
    push:
        branches: [main]
        tags:
          - 'v*.*.*'
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout code
                uses: actions/checkout@v4

            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@v3

            -   name: Log in to Docker Hub
                uses: docker/login-action@v3
                with:
                    username: ${{ secrets.DOCKER_USERNAME }}
                    password: ${{ secrets.DOCKER_PASSWORD }}

            -   name: Extract version from tag
                id: version
                run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

            -   name: Build and push Docker image
                uses: docker/build-push-action@v5
                with:
                    context: .
                    push: true
                    platforms: linux/amd64,linux/arm64
                    tags: |
                        ${{ secrets.DOCKER_USERNAME }}/dev-tools:latest
                        ${{ secrets.DOCKER_USERNAME }}/dev-tools:${{ steps.version.outputs.VERSION }}

            -   name: Update Docker Hub description
                uses: peter-evans/dockerhub-description@v4
                with:
                    username: ${{ secrets.DOCKER_USERNAME }}
                    password: ${{ secrets.DOCKER_PASSWORD }}
                    repository: ${{ secrets.DOCKER_USERNAME }}/dev-tools
                    short-description: "⚙️ Stackriv Dev Tools — .gitignore, License, package.json, .env & Dockerfile generators"
                    readme-filepath: ./README.md